version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# RSR Press Corps — Production Docker Compose
#
# For Portainer: paste this file into a new Stack, set env vars via the
# "Env" tab in the Portainer UI (do not put secrets in this file directly).
#
# Required env vars — set all of these before first deploy:
#   DATABASE_URL         postgresql://rsr:CHANGEME@db:5432/rsr_press_corps
#   SESSION_SECRET       64-char random hex (openssl rand -hex 64)
#   OPERATOR_EMAIL       admin@yourdomain.com
#   OPERATOR_PASSWORD    strong password for command dashboard
#
# Optional:
#   BOOTSTRAP_OPERATOR_EMAIL     (secondary operator login)
#   BOOTSTRAP_OPERATOR_PASSWORD
#   DISCORD_WEBHOOK_URL
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: rsr_press_corps
      POSTGRES_USER: rsr
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rsr -d rsr_press_corps"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── API Server (Express.js) ────────────────────────────────────────────────
  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    environment:
      PORT: "8080"
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      OPERATOR_EMAIL: ${OPERATOR_EMAIL:?OPERATOR_EMAIL is required}
      OPERATOR_PASSWORD: ${OPERATOR_PASSWORD:?OPERATOR_PASSWORD is required}
      BOOTSTRAP_OPERATOR_EMAIL: ${BOOTSTRAP_OPERATOR_EMAIL:-}
      BOOTSTRAP_OPERATOR_PASSWORD: ${BOOTSTRAP_OPERATOR_PASSWORD:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    # API is NOT exposed to the host directly — nginx proxies to it.

  # ── Web (nginx — static SPA + /api reverse proxy) ─────────────────────────
  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      - api
    networks:
      - internal

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  db_data:

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  internal:
    driver: bridge
